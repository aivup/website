# .github/workflows/update-fans.yml
name: Update Fan List

on:
  schedule:
    # 每小时执行一次（整点）
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true
          fi

      - name: Run fan list updater
        run: node scripts/update-fans.mjs

      - name: Check for changes
        id: git-check
        run: |
          git add fans.json data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-update fan list $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log completion
        run: echo "Fan list update completed at $(date -u '+%Y-%m-%d %H:%M UTC')"