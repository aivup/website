<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index - 记忆重构中</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: "Courier New", Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景噪点纹理 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            padding: 2rem;
            max-width: 600px;
        }

        /* 背景大文字 - 与 404 页面的 404 对应，这里改为 LOAD */
        h1.status {
            font-size: 8rem;
            font-weight: 100;
            letter-spacing: -5px;
            opacity: 0.1;
            margin-bottom: 1rem;
            position: relative;
            /* 轻微的左右浮动，模拟信号不稳定 */
            animation: drift 6s infinite ease-in-out;
        }

        /* 核心文案 */
        p.message {
            font-size: 1.2rem;
            line-height: 1.8;
            font-weight: 300;
            color: #a0a0a0;
            margin-bottom: 2rem;
            min-height: 3.6rem; /* 防止文字加载时跳动 */
        }

        /* 打字机光标 */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2rem;
            background-color: #a0a0a0;
            margin-left: 5px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        /* 状态指示器 */
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 3rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #333;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .dot:nth-child(2) { animation-delay: 0.5s; }
        .dot:nth-child(3) { animation-delay: 1s; }

        /* 联系按钮 - 与 404 页面按钮风格一致 */
        .contact-btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            border: 1px solid #333;
            padding: 10px 24px;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .contact-btn:hover {
            background-color: #fff;
            color: #000;
            opacity: 1;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* 动画定义 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes drift {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            h1.status {
                font-size: 5rem;
            }
            p.message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 背景状态码 -->
        <h1 class="status">LOAD</h1>
        
        <!-- 状态指示点 -->
        <div class="status-bar">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span>SYSTEM_REBUILDING</span>
        </div>

        <!-- 核心文案 (带打字机光标) -->
        <p class="message">
            记忆正在归档中，碎片正在重组...<span class="cursor"></span>
        </p>

        <!-- 联系按钮 -->
        <a href="https://github.com/aivup" class="contact-btn">查看项目仓库</a>
    </div>

</body>
</html>
